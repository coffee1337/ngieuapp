name: ngieuapp
description: "Мобильное приложение Княгининского университета (НГИЭУ)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  home_widget: ^0.7.0
  flutter_riverpod: ^2.6.1
  connectivity_plus: ^6.1.0
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  html: ^0.15.4
  flutter_html: ^3.0.0-beta.2
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.4
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.0
  flutter_inappwebview: ^6.1.5
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  drift_dev: ^2.32.1
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/json/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#9F003D"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#9F003D"
  image: assets/branding/splash.png
  android_12:
    image: assets/branding/splash.png
    color: "#9F003D"